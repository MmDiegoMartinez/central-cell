<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inicio</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f5f7fa;
      --surface: #ffffff;
      --muted: #6b7280;
      --text: #0f1724;
      --primary-600: #0f5476;
      --primary-400: #16729a;
      --accent: #1f9a8a;
      --glass: rgba(15, 23, 36, 0.04);
      --radius-lg: 14px;
      --radius-md: 10px;
      --shadow-sm: 0 6px 18px rgba(12, 18, 26, 0.06);
      --shadow-md: 0 10px 30px rgba(12, 18, 26, 0.09);
      --transition-fast: 220ms cubic-bezier(.2, .9, .2, 1);
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse at 20% 30%, rgba(31, 154, 138, 0.10) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 80%, rgba(15, 84, 118, 0.08) 0%, transparent 50%);
      font-family: 'DM Sans', sans-serif;
      padding: clamp(24px, 5vw, 60px);
      gap: clamp(28px, 4vw, 48px);
    }

    .header {
      text-align: center;
    }

    .header h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(1.6rem, 5vw, 2.8rem);
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .header p {
      margin-top: 8px;
      font-size: clamp(0.85rem, 2vw, 1rem);
      color: var(--muted);
      font-weight: 500;
    }

    .buttons-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(16px, 3vw, 24px);
      width: 100%;
    }

    /* Button */
    .animated-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      /* horizontal padding only — width grows with content */
      padding: 0 28px 0 10px;
      color: white;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.25);
      text-transform: uppercase;
      cursor: pointer;
      border: solid 2px var(--primary-600);
      letter-spacing: 2px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: clamp(14px, 2.5vw, 17px);
      background-color: var(--primary-400);
      border-radius: 50px;
      position: relative;
      overflow: hidden;
      transition: background-color 0.5s ease, box-shadow 0.5s ease, transform 0.1s ease, width 0.5s cubic-bezier(.2,.9,.2,1);
      height: 60px;
      /* no fixed min-width — let content drive the size */
      white-space: nowrap;
      box-shadow: 3px 4px 0px var(--primary-600);
    }

    .animated-button:hover {
      background-color: var(--accent);
      border-color: #157a6d;
      box-shadow: 3px 4px 0px #157a6d;
    }

    .animated-button:active {
      transform: scale(0.93) translate(2px, 2px);
      box-shadow: 1px 2px 0px var(--primary-600);
      transition: all 100ms ease;
    }

    /* Image wrapper — clips the zoom so it stays inside the pill */
    .btn-img-wrap {
      width: 42px;
      height: 42px;
      flex-shrink: 0;
      overflow: hidden;
      border-radius: 50%;
      position: relative;
      z-index: 2;
    }

    .btn-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      /* show bottom half of the image (feet/body area) */
      object-position: center 60%;
      transition: transform 0.5s ease;
    }

    .animated-button:hover .btn-img-wrap img {
      /* zoom in and shift down so the face / full body is visible */
      transform: scale(2.4) translateY(8%);
    }

    /* Text spans */
    .play {
      transition: all 0.5s ease;
      transition-delay: 300ms;
      position: relative;
      z-index: 2;
    }

    .now {
      position: absolute;
      left: 0;
      transform: translateX(-100%);
      transition: all 0.5s ease;
      z-index: 2;
    }

    .animated-button:hover .now {
      transform: translateX(14px);
      transition-delay: 300ms;
    }

    .animated-button:hover .play {
      transform: translateX(200%);
      transition-delay: 300ms;
    }

    /* Responsive */
    @media (min-width: 520px) {
      .buttons-wrapper {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        gap: clamp(16px, 3vw, 32px);
      }
    }
  </style>
</head>

<body>

  <div class="header">
    <h1>Selecciona una opción</h1>
    <p>Elige el módulo al que deseas acceder</p>
  </div>

  <div class="buttons-wrapper">

    <!-- Botón Validador -->
    <button class="animated-button" onclick="window.location.href='garantias/validador/validador.php'">
      <div class="btn-img-wrap">
        <img src="recursos/img/centralito.png" alt="Centralito" />
      </div>
      <span class="now">¡Ir!</span>
      <span class="play">Validador</span>
    </button>

    <!-- Botón Vendedor -->
    <button class="animated-button" onclick="window.location.href='garantias/vendedor/garantias.php'">
      <div class="btn-img-wrap">
        <img src="recursos/img/centralito.png" alt="Centralito" />
      </div>
      <span class="now">¡Ir!</span>
      <span class="play">Vendedor</span>
    </button>

  </div>

</body>
</html>
